<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.7">
    <title>Document</title>
    <!-- <script src="GridPathGenerator.js"></script> -->
    <script defer src="js/GridPath.js"></script>
    <script defer src="js/main.js"></script>
    <style>
        body{
            background-color: #000;
            color: #fff;
            fill: #fff;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 24px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        #svg{
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            overflow: hidden;
            user-select: none;
            touch-action: pinch-zoom;
            /* touch-action: none; */
        }
        #svg .cell>rect{
            z-index: 1;
            stroke: #333;
        }
        #svg .cell>text{
            z-index: 3;
        }
        #svg >g>g.arrowGroup>.arrowElement{
            opacity: 0.4;
        }
        #svg >g>g> path{
            stroke: rgb(170, 170, 170);
            stroke-width: 5px;
            stroke-linejoin: round;
        }
        
        #svg >g>g> path.arrowElement{
            marker-start: url(#arrow-head);
            pointer-events: none;
            stroke-linecap: round;
        }
        #svg >g>g> path.collisionElement{
            opacity: 0.01;
            stroke-width: 25px;
            stroke: white;
            stroke-linecap: square;
        }
        #svg >g>g> path.collisionElement:hover + path.arrowElement{
            opacity: 0.7;
        }
        #svg >g>g> path.collided{
            stroke: firebrick;
        }
        #svg >g>g> rect{
            fill: rgba(127, 127, 127, 0.3);
            /* stroke: rgba(255, 255, 255, 0.1); */
            stroke-width: 1;
            rx: 5;
            ry: 5;
            width: 3px;
            height: 3px;
        }
        .controls{
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            /* justify-content: space-between; */
            gap: 12px;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }
        .controls-toggle{
            transition: transform 0.1s ease-in-out;
            position: absolute;
            top: 0;
            left: 0;
            width: 24px;
            height: 24px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0px;
            margin: 0px;
        }
        .controls-toggle:not(.controls-toggle-open){
            transform: rotate(-90deg);
        }
        .controls-toggle-placeholder{
            width: 10px;
        }
        .debug{
            width: 100%;
            height: 100px;
        }
        #debug{
            width: calc(100% - 24px);
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: monospace, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 12px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <span class="controls-toggle" onclick="
        const controls = document.getElementsByClassName('controls')[0]; 
        const toggle = document.getElementsByClassName('controls-toggle')[0];
        controls.style.display = controls.style.display === 'none' ? null : 'none';
        toggle.classList.toggle('controls-toggle-open');
    ">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
    </span>
    <div class="controls">
        <span class="controls-toggle-placeholder"></span>
        <label for="level">
            Level:
            <input type="number" id="level" value="1">
        </label>
        <label for="width">
            Width:
            <input type="number" id="width" value="65">
        </label>
        <label for="height">
            Height:
            <input type="number" id="height" value="65">
        </label>
        <label for="maxLength">
            Max Length:
            <input type="number" id="maxLength" value="20">
        </label>
        <label for="jiggle">
            Jiggle:
            <input type="number" id="jiggle" value="0">
        </label>
        
        <label for="straightness">
            Straightness:
            <input type="number" id="straightness" value="0.95">
        </label>
        
        <button id="RestartButton" onclick="Main.restart()">Restart</button>
        <button id="hint" onclick="Main.hint()">hint</button>
        <button id="validate" onclick="Main.validateLevel()">validate</button>
    </div>
    <div class="debug">
        <textarea name="debug" id="debug" readonly></textarea>
    </div>

    <svg id="svg" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <marker id="arrow-head" class="canvas-object-conn-head" stroke="context-stroke" fill="context-stroke" markerWidth="90" markerHeight="5" refX="14" refY="12" orient="auto-start-reverse" markerUnits="strokeWidth" viewBox="0 0 20 20" >
            <!-- <path d="M8 5v14l9-7z" stroke-linejoin="round" stroke-linecap="round" ></path> -->
            <!-- <path d="M17.09 1.853a4.999 4.999 0 0 0-5.276 5.596l7.557 81.087c.483 3.938 5.137 5.773 8.176 3.223l15.947-12.932l7.15 12.385c4.112 7.122 10.636 8.872 17.758 4.76s8.87-10.638 4.758-17.76l-7.125-12.34l18.896-7.244c3.728-1.357 4.467-6.306 1.3-8.693L19.784 2.847a4.995 4.995 0 0 0-2.695-.994z" fill="#000000" style="
                scale: 0.1;
                rotate: 122deg;
                transform-origin: center;
            "></path> -->
            <path d="M8 13v6l13-7l-13 -7v6z" stroke-linejoin="round" stroke-linecap="round"></path>
            <!-- <path d="M50,50 h100 a20,20 0 0 1 20,20 v100 a20,20 0 0 1 -20,20 h-100 a20,20 0 0 1 -20,-20 v-100 a20,20 0 0 1 20,-20 z"/> -->
            </marker>
            <marker id="arrow-head-selected" class="canvas-object-conn-head selected" markerWidth="5" markerHeight="5" refX="18" refY="12" orient="auto-start-reverse" markerUnits="strokeWidth" viewBox="0 0 20 20">
            <path d="M8 5v14l11-7z"></path>
            </marker>
            <linearGradient id="linear" x1="0%" y1="0%" x2="100%" y2="20%">
                <stop offset="0%" stop-color="#05a"></stop>
                <stop offset="70%" stop-color="#0089bf"></stop>
            </linearGradient>
            <linearGradient id="linear-ref-dep" x1="30%" y1="0%" x2="80%" y2="0%">
                <stop offset="0%" stop-color="#12a900"></stop>
                <stop offset="70%" stop-color="#ff7500"></stop>
            </linearGradient>
            <linearGradient id="linear-ref" x1="30%" y1="0%" x2="80%" y2="0%">
                <stop offset="0%" stop-color="#12a900"></stop>
                <stop offset="70%" stop-color="#12a900"></stop>
            </linearGradient>
            <linearGradient id="linear-dep" x1="30%" y1="0%" x2="80%" y2="0%">
                <stop offset="0%" stop-color="#ff7500"></stop>
                <stop offset="70%" stop-color="#ff7500"></stop>
            </linearGradient>
        </defs>

    </svg>
</body>
</html>
