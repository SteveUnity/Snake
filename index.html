<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <script src="GridPathGenerator.js"></script> -->
    <script defer src="js/GridPath.js"></script>
    <script defer src="js/main.js"></script>
    <style>
        body{
            background-color: #000;
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 24px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        #svg{
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        #svg >g> path{
            stroke: red;
            stroke-width: 5px;
            stroke-linejoin: round;
            stroke-linecap: round;
        }
       
        #svg >g> path.arrowElement{
            marker-end: url(#arrow-head);
            pointer-events: none;
        }
        #svg >g> path.collisionElement{
            opacity: 0.01;
            stroke-width: 25px;
            stroke: white;
        }
        #svg >g> path.collisionElement:hover + path.arrowElement{
            opacity: 0.7;
        }
        #svg >g> path.collided{
            filter: hue-rotate(0deg) !important;
        }
        #svg >g> rect{
            fill: rgba(127, 127, 127, 0.3);
            /* stroke: rgba(255, 255, 255, 0.1); */
            stroke-width: 1;
            rx: 5;
            ry: 5;
            width: 3px;
            height: 3px;
        }
        .controls{
            display: flex;
            flex-direction: row;
            /* justify-content: space-between; */
            gap: 12px;
            padding: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="controls">
        <label for="level">
            Level:
            <input type="number" id="level" value="1">
        </label>
        <label for="width">
            Width:
            <input type="number" id="width" value="65">
        </label>
        <label for="height">
            Height:
            <input type="number" id="height" value="65">
        </label>
        <label for="maxLength">
            Max Length:
            <input type="number" id="maxLength" value="20">
        </label>
        <label for="jiggle">
            Jiggle:
            <input type="number" id="jiggle" value="0">
        </label>
        
        <label for="straightness">
            Straightness:
            <input type="number" id="straightness" value="0.95">
        </label>
        
        <button id="RestartButton" onclick="restart()">Restart</button>
    </div>

    <svg id="svg" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <marker id="arrow-head" class="canvas-object-conn-head" stroke="context-stroke" fill="context-stroke" markerWidth="90" markerHeight="5" refX="14" refY="12" orient="auto" markerUnits="strokeWidth" viewBox="0 0 20 20" >
            <path d="M8 5v14l9-7z" stroke-linejoin="round" stroke-linecap="round" ></path>
            <!-- <path d="M50,50 h100 a20,20 0 0 1 20,20 v100 a20,20 0 0 1 -20,20 h-100 a20,20 0 0 1 -20,-20 v-100 a20,20 0 0 1 20,-20 z"/> -->
            </marker>
            <marker id="arrow-head-selected" class="canvas-object-conn-head selected" markerWidth="5" markerHeight="5" refX="18" refY="12" orient="auto" markerUnits="strokeWidth" viewBox="0 0 20 20">
            <path d="M8 5v14l11-7z"></path>
            </marker>
            <linearGradient id="linear" x1="0%" y1="0%" x2="100%" y2="20%">
                <stop offset="0%" stop-color="#05a"></stop>
                <stop offset="70%" stop-color="#0089bf"></stop>
            </linearGradient>
            <linearGradient id="linear-ref-dep" x1="30%" y1="0%" x2="80%" y2="0%">
                <stop offset="0%" stop-color="#12a900"></stop>
                <stop offset="70%" stop-color="#ff7500"></stop>
            </linearGradient>
            <linearGradient id="linear-ref" x1="30%" y1="0%" x2="80%" y2="0%">
                <stop offset="0%" stop-color="#12a900"></stop>
                <stop offset="70%" stop-color="#12a900"></stop>
            </linearGradient>
            <linearGradient id="linear-dep" x1="30%" y1="0%" x2="80%" y2="0%">
                <stop offset="0%" stop-color="#ff7500"></stop>
                <stop offset="70%" stop-color="#ff7500"></stop>
            </linearGradient>
        </defs>

    </svg>
</body>
</html>
